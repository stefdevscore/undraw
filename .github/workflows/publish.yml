name: Publish OSS Suite

on:
  release:
    types: [published]

jobs:
  # 1. Publish to NPM (Node.js)
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      id-token: write      # Required for OIDC
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Diagnostic Info
        run: |
          echo "Package: undraw-cli"
          cat ./wrapper-js/package.json | grep version
          git status
      - run: npm install
        working-directory: ./wrapper-js
      - name: Publish from directory
        run: npm publish --provenance --access public
        working-directory: ./wrapper-js

  # 2. Publish to PyPI (Python)
  publish-pypi:
    runs-on: ubuntu-latest
    permissions:
      id-token: write      # Required for OIDC
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build and Publish
        run: |
          pip install build
          python -m build
        working-directory: ./wrapper-py
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ./wrapper-py/dist/

  # 3. Publish to Cargo (Rust)
  publish-cargo:
    runs-on: ubuntu-latest
    permissions:
      id-token: write      # Required for OIDC
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish
        run: cargo publish --allow-dirty --token ${{ steps.auth.outputs.token }}
        working-directory: ./core-rs
